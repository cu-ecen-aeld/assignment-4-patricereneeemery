name: Assignment 4 Part 1

on:
  push:
    branches: [ "main" ]

jobs:
  buildroot-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Clean Buildroot output
        run: |
          rm -rf $GITHUB_WORKSPACE/buildroot/output

      - name: Set BR2_EXTERNAL
        run: |
          echo "BR2_EXTERNAL=$GITHUB_WORKSPACE/base_external" >> $GITHUB_ENV

      - name: Build Buildroot
        run: |
          cd $GITHUB_WORKSPACE/buildroot
          make aesd_defconfig
          make
