name: Assignment 4 Part 1

on:
  push:
    branches: [ "main" ]

jobs:
  buildroot-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Clean Buildroot output
        run: |
          rm -rf $GITHUB_WORKSPACE/buildroot/output

      - name: Build Buildroot
        run: |
          export BR2_EXTERNAL=$GITHUB_WORKSPACE/base_external
          cd $GITHUB_WORKSPACE/buildroot
          make BR2_EXTERNAL=$BR2_EXTERNAL aesd_defconfig
          make BR2_EXTERNAL=$BR2_EXTERNAL
